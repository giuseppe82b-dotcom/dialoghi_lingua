<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Didactic Dialog App - English Lesson</title>
    <style>
        :root {
            --bg-setup: rgb(1, 33, 105);
            --bg-game: #4361ee;
            --card-setup: rgb(255, 255, 255);
            --char-circle: #7209b7;
            --text-dark: #2d3436;
            --bubble: #ffffff;
            --accent: #f72585; 
            --example-btn: #00b894;
            --correct: #55efc4;
            --wrong: #ff7675;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-setup);
            transition: background-color 0.5s ease;
        }

        #setup-screen {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .upload-card {
            background: var(--card-setup);
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }

        .section-divider {
            margin: 15px 0;
            border-bottom: 1px solid #eee;
            padding-bottom: 15px;
        }

        /* Liste dinamiche */
        #list-esempi {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 200px;
            overflow-y: auto;
            margin-top: 10px;
            padding: 5px;
        }

        #game-screen { 
            display: none; 
            width: 100%;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            color: white;
        }

        .game-container {
            max-width: 700px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar {
            width: 100px;
            height: 100px;
            background-color: var(--char-circle);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            border: 5px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 15px rgba(0,0,0,0.2);
            text-align: center;
        }

        .bubble {
            background: var(--bubble);
            color: var(--text-dark);
            padding: 20px;
            border-radius: 20px;
            position: relative;
            margin-top: 20px;
            font-size: 1.2rem;
            text-align: center;
        }

        .word-bank, .drop-zone {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            min-height: 50px;
            width: 100%;
            margin-top: 15px;
            border: 2px dashed rgba(255,255,255,0.4);
        }

        .word {
            background: white;
            color: var(--bg-game);
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
            user-select: none;
        }

        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            margin-top: 10px;
        }

        .btn-example {
            background: var(--example-btn);
            font-size: 0.9rem;
        }

        .feedback {
            margin: 15px 0;
            font-weight: bold;
            min-height: 25px;
        }
    </style>
</head>
<body>

    <div id="setup-screen">
        <div class="upload-card">
            <h1 style="color: var(--bg-setup); margin-bottom: 5px;">English Lab 🏫</h1>
            
            <div id="examples-area" class="section-divider">
                <p style="color: #636e72; font-weight: bold; margin-bottom: 5px;">Scegli una lezione:</p>
                <div id="list-esempi">
                    <p style="font-size: 0.8rem;">Caricamento lezioni...</p>
                </div>
            </div>

            <div>
                <p style="color: #636e72; font-size: 0.9rem;">Oppure usa un file locale:</p>
                <input type="file" id="jsonFile" accept=".json" style="font-size: 0.8rem;">
                <button class="btn" onclick="startFromFile()">Avvia File Caricato</button>
            </div>
        </div>
    </div>

    <div id="game-screen">
        <div class="game-container">
            <div id="char-name" class="avatar">?</div>
            <div id="it-phrase" class="bubble">...</div>
            <div id="feedback-msg" class="feedback"></div>
            <div id="drop-zone" class="drop-zone"></div>
            <div id="word-bank" class="word-bank"></div>
            <button class="btn" onclick="checkSentence()" style="max-width: 250px;">Verifica</button>
        </div>
    </div>

    <script>
        let dialoghi = [];
        let currentIndex = 0;

        // Al caricamento della pagina, cerca l'indice degli esempi
        window.onload = async () => {
            const listContainer = document.getElementById('list-esempi');
            try {
                const response = await fetch('ESEMPI/index.json');
                if (!response.ok) throw new Error();
                const esempi = await response.json();
                
                listContainer.innerHTML = '';
                esempi.forEach(es => {
                    const btn = document.createElement('button');
                    btn.className = 'btn btn-example';
                    btn.innerText = es.nome;
                    btn.onclick = () => loadJson('ESEMPI/' + es.file);
                    listContainer.appendChild(btn);
                });
            } catch (e) {
                listContainer.innerHTML = '<p style="color:red; font-size:0.8rem;">Indice esempi non trovato.</p>';
            }
        };

        async function loadJson(path) {
            try {
                const response = await fetch(path);
                const data = await response.json();
                initGame(data);
            } catch (err) { alert("Errore nel caricamento del file."); }
        }

        function startFromFile() {
            const fileInput = document.getElementById('jsonFile');
            if (!fileInput.files[0]) return alert("Seleziona un file.");
            const reader = new FileReader();
            reader.onload = (e) => initGame(JSON.parse(e.target.result));
            reader.readAsText(fileInput.files[0]);
        }

        function initGame(data) {
            dialoghi = data;
            currentIndex = 0;
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('game-screen').style.display = 'flex';
            document.body.style.backgroundColor = "var(--bg-game)";
            loadStep();
        }

        function loadStep() {
            const step = dialoghi[currentIndex];
            document.getElementById('char-name').innerText = step.personaggio;
            document.getElementById('it-phrase').innerText = step.italiano;
            document.getElementById('feedback-msg').innerText = "";
            document.getElementById('drop-zone').innerHTML = "";
            
            let words = [...step.inglese.split(" "), ...step.extra].sort(() => Math.random() - 0.5);
            const bank = document.getElementById('word-bank');
            bank.innerHTML = "";
            words.forEach(text => {
                const w = document.createElement('div');
                w.className = 'word';
                w.innerText = text;
                w.onclick = () => {
                    (w.parentElement.id === 'word-bank' ? document.getElementById('drop-zone') : bank).appendChild(w);
                };
                bank.appendChild(w);
            });
        }

        function checkSentence() {
            const user = Array.from(document.getElementById('drop-zone').children).map(e => e.innerText).join(" ");
            const target = dialoghi[currentIndex].inglese;
            const f = document.getElementById('feedback-msg');

            if (user === target) {
                f.innerText = "Correct! 🌟";
                f.style.color = "var(--correct)";
                setTimeout(() => {
                    currentIndex++;
                    if (currentIndex < dialoghi.length) loadStep();
                    else { alert("Bravo! Lezione finita."); location.reload(); }
                }, 1500);
            } else {
                f.innerText = "I don't understand... ❌";
                f.style.color = "var(--wrong)";
            }
        }
    </script>
</body>
</html>
